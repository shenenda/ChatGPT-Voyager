<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Voyager Fixture</title>
    <link rel="stylesheet" href="../content.css">
    <style>
      body {
        max-width: 820px;
        margin: 0 auto;
        padding: 48px 24px 160px;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }

      article {
        margin: 42px 0;
        padding: 20px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }

      [data-message-author-role="user"] {
        background: #f3f4f6;
      }

      #prompt-textarea {
        position: fixed;
        left: 50%;
        bottom: 24px;
        width: min(680px, calc(100vw - 48px));
        min-height: 88px;
        transform: translateX(-50%);
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Fixture</h1>
    <article>
      <div data-message-author-role="user">First user prompt about model design.</div>
    </article>
    <article>
      <div data-message-author-role="assistant">Assistant answer with selectable text for quote insertion.</div>
    </article>
    <article>
      <div data-message-author-role="user">Second user prompt with a longer body that should be visible in the tooltip preview and truncated if needed.</div>
    </article>
    <article>
      <div data-message-author-role="assistant">Another answer. Select this sentence to test quote-to-ask.</div>
    </article>
    <article>
      <div data-message-author-role="user">Third user prompt.</div>
    </article>
    <textarea id="prompt-textarea" placeholder="Message ChatGPT"></textarea>
    <script src="../content.js"></script>
  </body>
</html>
